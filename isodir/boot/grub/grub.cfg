# boot/grub/grub.cfg
#
# GRUB2 menu configuration for GeckoOS.
# This file is embedded in the ISO image created by grub-mkrescue.

set timeout=3
set default=0

menuentry "GeckoOS" {
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "GeckoOS (v86 / legacy)" {
    multiboot /boot/kernel.elf
    boot
}

menuentry "GeckoOS (serial debug)" {
    multiboot2 /boot/kernel.elf geckoOS.debug=serial
    boot
}